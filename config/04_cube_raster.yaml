# =============================================================================
# NetCDF4 Multi-Variable Cube Writer Configuration
# =============================================================================
# Writes a NetCDF4 file containing one or more variables, each built from
# one or more GeoTIFFs sharing a common master grid.
#
# Per-variable output shape is determined automatically from the input:
#
#   input: single file (1 band)   →  variable stored as (y, x)
#   input: single file (N bands)  →  variable stored as (band, y, x)
#   input: list/glob of files     →  variable stored as (band, y, x)
#
# Usage:
#   python 04_cube_raster.py [config_path]
#   (defaults to config/04_cube_raster.yaml)
# =============================================================================


# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  master_grid: "data/00_base_grid/maaden_base_grid90m.tif"
  output_nc:   "data/04_cube_data/geophys_coarse90m.nc"


# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
# Each key under 'variables' becomes a variable inside the .nc file.
#
# apply_mask : true (default) — pixels where master == 0 are set to NaN
#              false           — no masking applied
#
# input — one of:
#   file  : "path/to/file.tif"               (single file)
#   files :                                    (explicit ordered list)
#     - "path/to/band1.tif"
#     - "path/to/band2.tif"
#   glob  :                                    (dir + pattern, sorted)
#     dir:     "path/to/dir"
#     pattern: "*.tif"
# -----------------------------------------------------------------------------
variables:

  mag:
    apply_mask: true
    input:
      files:
        - "data/03_snap_data/geophys_coarse90m/snapped_MAG_TMI.tif"
        - "data/03_snap_data/geophys_coarse90m/snapped_MAG_RTP.tif"
        - "data/03_snap_data/geophys_coarse90m/snapped_MAG_RTP_FVD.tif"
        - "data/03_snap_data/geophys_coarse90m/snapped_MAG_RTP_ANSIG.tif"

  grav:
    apply_mask: true
    input:
      files:
        - "data/03_snap_data/geophys_coarse90m/snapped_GRAV_FAA.tif"
        - "data/03_snap_data/geophys_coarse90m/snapped_GRAV_FAA-ERR.tif"
        - "data/03_snap_data/geophys_coarse90m/snapped_GRAV_VGG.tif"


# -----------------------------------------------------------------------------
# Processing
# -----------------------------------------------------------------------------
# compress_level : zlib deflate level (1–9). Default: 4.
#                    1 → fastest / largest
#                    4 → balanced
#                    9 → smallest / slowest
processing:
  compress_level: 4


# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------
# Top-level keys not matching a variable name → written as global attributes.
# Keys matching a variable name (e.g. 'mag', 'grav') → written as attributes
# on that specific variable.
# -----------------------------------------------------------------------------
metadata:
  project:      "Maaden Project"
  resolution:   "90m"
  crs:          "UTM Zone 37N / WGS-84"
  created_by:   "M[EX]2"
  nodata_value: "NaN"

  mag:
    sensor:       "Legacy Aeromagnetic Survey"
    product:      "Reduced-to-Pole Magnetic Field Derivatives"
    units:        "nT (TMI, RTP); nT/m (RTP-FVD); dimensionless (RTP-ANSIG)"
    bands:        "TMI, RTP, RTP-FVD, RTP-ANSIG"
    band_descriptions: "TMI=Total Magnetic Intensity; RTP=Reduced-to-Pole; RTP-FVD=RTP First Vertical Derivative; RTP-ANSIG=RTP Analytic Signal"
    native_resolution: "200m native, resampled"
    correction:   "Levelling, IGRF, and variable-inclination RTP applied"

  grav:
    sensor:       "Satellite Altimetry Gravity"
    product:      "Free-Air Gravity Anomaly and Vertical Gravity Gradient"
    units:        "mGal (FAA, FAA-ERR); Eotvos (VGG)"
    bands:        "FAA, FAA-ERR, VGG"
    band_descriptions: "FAA=Free-Air Anomaly; FAA-ERR=Free-Air Anomaly Error; VGG=Vertical Gravity Gradient"
    native_resolution: "1.85km native, resampled"
    correction:   "Derived from satellite altimetry inversion"


# -----------------------------------------------------------------------------
# Running Code
# -----------------------------------------------------------------------------
# python scripts/04_cube_raster.py