# =============================================================================
# Raster Alignment (Snap to Master Grid) Configuration
# =============================================================================
# Used by 03_snap_raster.py to:
#   1. Reproject rasters to a master reference grid
#   2. Snap rasters to the exact grid alignment
#   3. Optionally apply the master grid as a binary mask
#
# -----------------------------------------------------------------------------
# Operating Modes
# -----------------------------------------------------------------------------
# Per-file mode (merge_output: false)
#   - Each raster is processed independently
#   - Output: snapped_<original_name>.tif
#
# Merge mode (merge_output: true)
#   - All rasters are mosaicked into a single raster
#   - Overlap handling controlled by overlap_strategy
#
# -----------------------------------------------------------------------------
# Mask Behaviour
# -----------------------------------------------------------------------------
# Master grid contains only 1s:
#   → Masking is skipped (grid defines extent only)
#
# Master grid contains 0s:
#   → Pixels where master == 0 are set to NaN
# =============================================================================


# =============================================================================
# Paths
# =============================================================================
paths:
  master_grid: "data/00_base_grid/maaden_base_grid90m.tif"
  output_dir:  "data/03_snap_data/geophys_coarse90m"


# =============================================================================
# Input Files
# =============================================================================
# Use ONLY ONE input method:
#
# Option A — glob
#   Scan a directory using a glob pattern
#
# Option B — files
#   Explicit list of files
# =============================================================================
inputs:

  # ---------------------------------------------------------------------------
  # Option A — Glob Input
  # ---------------------------------------------------------------------------
  glob:
    dir:     "data/02_mosaic_data/geophys_coarse90m"
    pattern: "*.tif"


  # ---------------------------------------------------------------------------
  # Option B — Explicit File List
  # ---------------------------------------------------------------------------
  # files:
  #   - "data/00_raw_dem/tile_a.tif"
  #   - "data/00_raw_dem/tile_b.tif"


# =============================================================================
# Processing
# =============================================================================
# resample_alg:
#   nearest      → categorical/scientific integrity              [default]
#   bilinear     → smooth interpolation for continuous rasters
#   cubic        → sharper interpolation
#   cubicspline  → very smooth, recommended for DEMs
#   lanczos      → high-quality downsampling
#   average      → mean of contributing pixels
#   mode         → most frequent value
#   max / min    → statistical extremes
#   med          → median value
#
# apply_mask:
#   true  → set pixels where master == 0 to NaN
#   false → keep full extent
#
# merge_output:
#   false → process each file separately
#   true  → merge all inputs into one raster
#
# overlap_strategy (used only if merge_output: true):
#   first   → first raster wins in overlaps          [fastest]
#   last    → last raster wins
#   average → NaN-aware mean blending across overlaps
#
# strip_height:
#   Controls chunk size for average mode.
#   Lower  → lower RAM usage
#   Higher → faster processing
# =============================================================================
processing:
  resample_alg: "bilinear"
  strip_height: 64000
  apply_mask: true
  merge_output: false
  # Only used if merge_output: true
  overlap_strategy: "first"           # first | last | average
  output_name: "emitl2a_hyper60m.tif" # Only used if merge_output: true

  
# =============================================================================
# Output Format
# =============================================================================
# bigtiff:
#   YES | NO | IF_SAFER
#
# compress:
#   LZW | DEFLATE | NONE
#
# predictor:
#   1 → none
#   2 → horizontal differencing (recommended for Float32/DEM)
#
# block_size:
#   Internal tile size in pixels
# =============================================================================
output_format:
  bigtiff: "IF_SAFER"
  compress: "LZW"
  predictor: 2
  block_size: 512


# =============================================================================
# Run Command
# =============================================================================
# python scripts/03_snap_raster.py

